  <script>
    // Firebase Online Counter
    const usersRef = db.ref("onlineUsers");
    const totalRef = db.ref("totalVisitors");
    const todayRef = db.ref("dailyVisitors/" + new Date().toISOString().slice(0, 10));
    const sessionId = "user_" + Math.random().toString(36).substring(2, 12);
    
    usersRef.child(sessionId).set({
      lastSeen: Date.now()
    });
    
    totalRef.transaction(c => (c || 0) + 1);
    todayRef.transaction(c => (c || 0) + 1);
    
    window.addEventListener("beforeunload", () => usersRef.child(sessionId).remove());
    
    const onlineCounter = document.getElementById("online-counter");
    const ACTIVE_THRESHOLD = 5 * 1000;
    
    function updateOnlineCounter() {
      usersRef.once("value").then(snap => {
        const onlineUsers = snap.val() || {};
        const now = Date.now();
        const activeUsers = Object.values(onlineUsers).filter(u => (now - u.lastSeen) <= ACTIVE_THRESHOLD);
        const totalOnline = activeUsers.length;
        totalRef.once("value").then(snap2 => {
          const totalVisitors = snap2.val() || 0;
          todayRef.once("value").then(snap3 => {
            const todayVisitors = snap3.val() || 0;
            onlineCounter.innerHTML = `👥 Online: ${totalOnline} | 📅 Today: ${todayVisitors} | 🌍 Total: ${totalVisitors}`;
          });
        });
      });
    }
    
    updateOnlineCounter();
    usersRef.on("value", updateOnlineCounter);
    
    setInterval(() => usersRef.child(sessionId).update({
      lastSeen: Date.now()
    }), 15000);
  </script>
  
  <script>
    // ================================

    function setupPlaylistSelector() {
      const playlistSelector = document.getElementById('playlistSelector');
      
      const playlists = [
        { url: m3u1Url, name: "Popular TV", displayName: "Popular TV" },
        { url: m3u2Url, name: "BD TV 🇧🇩", displayName: "BD TV 🇧🇩" },
        { url: m3u3Url, name: "PAK TV 🇵🇰", displayName: "PAK TV 🇵🇰" },
        { url: m3u4Url, name: "Yupp TV", displayName: "Yupp TV" },
        { url: m3u5Url, name: "Roar Zone", displayName: "Roar Zone" },
        { url: m3u6Url, name: "IND", displayName: "IND" },
        { url: m3u7Url, name: "Fancode IND", displayName: "Fancode IND" },
        { url: m3u8Url, name: "Sports TV ⚽🏏", displayName: "Sports TV ⚽🏏" }
      ];
      
      let buttonsHtml = '';
      playlists.forEach((playlist, index) => {
        const activeClass = index === 0 ? 'active' : '';
        buttonsHtml += `<button class="playlist-btn ${activeClass}" data-playlist-url="${playlist.url}" data-playlist-name="${playlist.name}" data-display-name="${playlist.displayName}" data-index="${index}" tabindex="${index === 0 ? '0' : '-1'}">${playlist.displayName}</button>`;
      });
      
      playlistSelector.innerHTML = buttonsHtml;
      
      playlistButtons = document.querySelectorAll('.playlist-btn');
      
      playlistButtons.forEach(btn => {
        // Click event for mouse
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          
          // Update active states
          playlistButtons.forEach(b => {
            b.classList.remove('active', 'playlist-selected');
            b.setAttribute('tabindex', '-1');
          });
          
          this.classList.add('active', 'playlist-selected');
          this.setAttribute('tabindex', '0');
          
          const playlistUrl = this.getAttribute('data-playlist-url');
          const playlistName = this.getAttribute('data-display-name');
          
          // Load the playlist
          loadSinglePlaylist(playlistUrl, playlistName);
          
          // Update focus indices
          playlistFocusIndex = parseInt(this.getAttribute('data-index'));
          currentFocusIndex = 0; // Reset channel focus to first channel
          
          // Switch back to channels mode
          currentMode = 'channels';
        });
        
        // Keyboard Enter handler
        btn.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            e.stopPropagation();
            
            // Trigger click programmatically
            this.click();
            
            // After loading, ensure focus moves to channels
            setTimeout(() => {
              currentMode = 'channels';
              if (channelItems.length > 0) {
                setFocus(0);
              }
            }, 500);
          }
        });
      });
      
      // Load default playlist
      loadSinglePlaylist(m3u1Url, "Popular TV");
    }
    
    async function loadSinglePlaylist(playlistUrl, playlistName) {
      try {
        // Show loader with proper message
        document.getElementById('channelList').innerHTML = `
          <div class="loader-container">
            <span class="loader"></span>
            <div class="loading-text">Loading ${playlistName} channels... Please wait</div>
          </div>
        `;
        
        const m3uChannels = await loadM3uPlaylist(playlistUrl);
        
        if (m3uChannels && m3uChannels.length > 0) {
          channels = m3uChannels;
          
          playlistSources = [{
            name: playlistName,
            startIndex: 0,
            count: m3uChannels.length
          }];
          
          // Render channels with names and logos together
          renderChannelsWithLoader();
          
          // Reset search if active
          const searchInput = document.getElementById('channelSearch');
          if (searchInput.value) {
            searchInput.value = '';
            isSearchActive = false;
            document.getElementById('clearSearch').style.display = 'none';
            document.getElementById('searchResultsInfo').style.display = 'none';
          }
          
          if (channels.length > 0 && !playerInitialized) {
            initPlayer(channels[0].url, channels[0].logo);
            playerInitialized = true;
          }
          
          // Force focus back to channels after a short delay
          setTimeout(() => {

  <script>
    // ================================
    // TV REMOTE NAVIGATION FUNCTIONS
    // ================================
    
    function updateChannelItems() {
      channelItems = document.querySelectorAll('.channel-item');
      if (channelItems.length > 0 && currentMode === 'channels') {
        setFocus(currentFocusIndex);
      }
    }
    
    function updatePlaylistButtons() {
      playlistButtons = document.querySelectorAll('.playlist-btn');
    }
    
    function setFocus(index) {
      if (focusDebounceTimer) {
        clearTimeout(focusDebounceTimer);
      }
      
      focusDebounceTimer = setTimeout(() => {
        if (currentMode === 'playlist') {
          // Playlist mode navigation
          playlistButtons.forEach(btn => {
            btn.classList.remove('playlist-selected');
            btn.setAttribute('tabindex', '-1');
          });
          
          if (playlistButtons.length > 0 && index >= 0 && index < playlistButtons.length) {
            playlistFocusIndex = index;
            const selectedBtn = playlistButtons[playlistFocusIndex];
            selectedBtn.classList.add('playlist-selected');
            selectedBtn.setAttribute('tabindex', '0');
            
            // Scroll into view
            selectedBtn.scrollIntoView({
              behavior: 'smooth',
              block: 'nearest',
              inline: 'center'
            });
          }
        } else if (currentMode === 'channels') {
          // Channel mode navigation
          channelItems.forEach(item => {
            item.classList.remove('channel-selected');
            item.setAttribute('tabindex', '-1');
          });
          
          if (channelItems.length > 0 && index >= 0 && index < channelItems.length) {
            currentFocusIndex = index;
            const selectedItem = channelItems[currentFocusIndex];
            
            selectedItem.classList.add('channel-selected');
            selectedItem.setAttribute('tabindex', '0');
            
            selectedItem.scrollIntoView({
              behavior: 'smooth',
              block: 'nearest',
              inline: 'nearest'
            });
          }
        }
      }, 50);
    }
    
    function navigateUp() {
      if (currentMode === 'playlist') {
        // From playlist to channels
        currentMode = 'channels';
        setFocus(currentFocusIndex);
      } else if (currentMode === 'channels') {
        if (channelItems.length === 0) return;
        
        const columns = getGridColumns();
        if (currentFocusIndex >= columns) {
          setFocus(currentFocusIndex - columns);
        } else {
          // At top row, move to playlist
          if (playlistButtons.length > 0) {
            currentMode = 'playlist';
            setFocus(playlistFocusIndex);
          }
        }
      }
    }
    
    function navigateDown() {
      if (currentMode === 'playlist') {
        // From playlist to channels
        currentMode = 'channels';
        setFocus(currentFocusIndex);
      } else if (currentMode === 'channels') {
        if (channelItems.length === 0) return;
        
        const columns = getGridColumns();
        if (currentFocusIndex + columns < channelItems.length) {
          setFocus(currentFocusIndex + columns);
        } else {
          setFocus(currentFocusIndex % columns);
        }
      }
    }
    
    function navigateLeft() {
      if (currentMode === 'playlist') {
        if (playlistButtons.length > 0) {
          if (playlistFocusIndex > 0) {
            setFocus(playlistFocusIndex - 1);
          } else {
            setFocus(playlistButtons.length - 1);
          }
        }
      } else if (currentMode === 'channels') {
        if (channelItems.length === 0) return;
        
        if (currentFocusIndex > 0) {
          setFocus(currentFocusIndex - 1);
        } else {
          setFocus(channelItems.length - 1);
        }
      }
    }
    
    function navigateRight() {
      if (currentMode === 'playlist') {
        if (playlistButtons.length > 0) {
          if (playlistFocusIndex < playlistButtons.length - 1) {
            setFocus(playlistFocusIndex + 1);
          } else {
            setFocus(0);
          }
        }
      } else if (currentMode === 'channels') {
        if (channelItems.length === 0) return;
        
        if (currentFocusIndex < channelItems.length - 1) {
          setFocus(currentFocusIndex + 1);
        } else {
          setFocus(0);
        }
      }
    }
    
    // Updated handleEnterPress with your exact logic
    function handleEnterPress() {
      const now = Date.now();
      
      if (isInFullscreen) {
        if (now - lastEnterPressTime < 1000) {
          togglePlayPause();
        } else {
          exitFullscreenMode();
        }
      } else {
        if (now - lastEnterPressTime < 1000) {
          enterFullscreenMode();
        } else {
          selectChannel();
        }
      }
      
      lastEnterPressTime = now;
    }
    
    function selectChannel() {
      if (channelItems.length > 0 && currentFocusIndex < channelItems.length) {
        const selectedItem = channelItems[currentFocusIndex];
        const url = selectedItem.getAttribute('data-url');
        const logo = selectedItem.getAttribute('data-logo');
        
        if (url && url !== 'null') {
          playChannel(url, logo);
        }
      }
    }
    
    function togglePlayPause() {
      if (player) {
        if (player.isPlaying()) {
          player.pause();
        } else {
          player.play();
        }
      }
    }
    
    function enterFullscreenMode() {
      const playerElement = document.getElementById('player');
      if (playerElement.requestFullscreen) {
        playerElement.requestFullscreen();
      } else if (playerElement.webkitRequestFullscreen) {
        playerElement.webkitRequestFullscreen();
      } else if (playerElement.msRequestFullscreen) {
        playerElement.msRequestFullscreen();
      }
      
      isInFullscreen = true;
      document.getElementById('fullscreenIndicator').classList.add('visible');
      
      // Also play the channel if not playing
      if (player && !player.isPlaying()) {
        player.play();
      }
    }
    
    function exitFullscreenMode() {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) {
        document.msExitFullscreen();
      }
      
      isInFullscreen = false;
      document.getElementById('fullscreenIndicator').classList.remove('visible');
    }
    
    function getGridColumns() {
      const container = document.querySelector('.playlist-container');
      if (!container) return 3;
      
      const computedStyle = window.getComputedStyle(container);
      const gridTemplateColumns = computedStyle.gridTemplateColumns;
      const columns = gridTemplateColumns.split(' ').length;
      
      return Math.max(columns, 3);
    }
    
    // ================================
    // PRESS AND HOLD NAVIGATION FUNCTIONS
    // ================================
    
    function handleKeyDown(event) {
      const key = event.key;
      const searchInput = document.getElementById('channelSearch');
      
      // Handle media keys
      if (key === 'MediaPlayPause' || key === 'Play' || key === 'Pause') {
        event.preventDefault();
        togglePlayPause();
        return;
      }
      
      if (key === 'MediaRewind' || key === 'Rewind') {
        event.preventDefault();
        handleRewind();
        return;
      }
      
      if (key === 'MediaFastForward' || key === 'FastForward') {
        event.preventDefault();
        handleFastForward();
        return;
      }
      
      if (key === 'ChannelUp' || key === 'PageUp' || (key === 'PageUp')) {
        event.preventDefault();
        navigateToNextChannel();
        return;
      }
      
      if (key === 'ChannelDown' || key === 'PageDown' || (key === 'PageDown')) {
        event.preventDefault();
        navigateToPreviousChannel();
        return;
      }
      
      // Handle F key for fullscreen toggle
      if (key === 'f' || key === 'F') {
        event.preventDefault();
        if (isInFullscreen) {
          exitFullscreenMode();
        } else {
          enterFullscreenMode();
        }
        return;
      }
      
      // Search box handling
      if (document.activeElement === searchInput) {
        if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight' || key === 'Enter' || key === 'Escape') {
          event.preventDefault();
          
          if (key === 'ArrowDown' || key === 'ArrowUp') {
            if (filteredChannels.length > 0) {
              currentMode = 'channels';
              focusOnChannels();
              // Start moving immediately
              startMoving(key);
            }
          } else if (key === 'Enter') {
            if (filteredChannels.length > 0) {
              currentFocusIndex = 0;
              updateChannelItems();
              selectChannel();
            }
          } else if (key === 'Escape') {
            searchInput.value = '';
            isSearchActive = false;
            document.getElementById('clearSearch').style.display = 'none';
            clearSearch();
          }
        }
        return;
      }
      
      // Prevent default for navigation keys
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', ' ', 'Escape', 'Tab', 'PageUp', 'PageDown', 'ChannelUp', 'ChannelDown'].includes(key)) {
        event.preventDefault();
      }
      
      // Handle Channel Up/Down
      if (key === 'ChannelUp' || key === 'PageUp') {
        navigateToNextChannel();
      } else if (key === 'ChannelDown' || key === 'PageDown') {
        navigateToPreviousChannel();
      }
      
      // Handle arrow navigation - PRESS AND HOLD to move continuously
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
        // If not already moving with this key, start moving
        if (!isMoving || activeKey !== key) {
          stopMoving(); // Stop any previous movement
          startMoving(key);
        }
      } else if (key === 'Enter' || key === ' ') {
        // Special handling for Enter in playlist mode
        if (currentMode === 'playlist' && playlistButtons.length > 0) {
          // Trigger the selected playlist button
          const selectedBtn = playlistButtons[playlistFocusIndex];
          if (selectedBtn) {
            selectedBtn.click();
          }
        } else {
          handleEnterPress();
        }
      } else if (key === 'Escape') {
        if (isInFullscreen) {
          exitFullscreenMode();
        } else if (currentMode === 'playlist') {
          currentMode = 'channels';
          setFocus(currentFocusIndex);
        } else if (currentMode === 'player') {
          currentMode = 'channels';
          setFocus(currentFocusIndex);
        }
      } else if (key === 'Tab') {
        if (currentMode === 'channels') {
          currentMode = 'player';
          document.getElementById('player').focus();
        } else {
          currentMode = 'channels';
          setFocus(currentFocusIndex);
        }
      }
    }
    
    function startMoving(key) {
      // First movement immediately
      handleNavigationKey(key);
      
      // Then set interval for continuous movement while key is pressed
      isMoving = true;
      activeKey = key;
      
      if (moveInterval) {
        clearInterval(moveInterval);
      }
      
      moveInterval = setInterval(() => {
        if (isMoving && activeKey === key) {
          handleNavigationKey(key);
        }
      }, moveSpeed);
    }
    
    function stopMoving() {
      if (moveInterval) {
        clearInterval(moveInterval);
        moveInterval = null;
      }
      isMoving = false;
      activeKey = null;
    }
    
    function handleKeyUp(event) {
      const key = event.key;
      
      // Stop moving when any arrow key is released
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
        stopMoving();
      }
      
      // Also handle if it's the same key that was being pressed
      if (activeKey === key) {
        stopMoving();
      }
    }
    
    // Make sure to also stop moving when window loses focus
    window.addEventListener('blur', function() {
      stopMoving();
    });
    
    // Handle visibility change
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        stopMoving();
      }
    });
    
    function handleRewind() {
      const now = Date.now();
      if (now - lastRewindTime < 500) return; // Debounce
      
      lastRewindTime = now;
      
      // Cycle through playlists backwards
      if (playlistButtons.length > 0) {
        let newIndex = playlistFocusIndex - 1;
        if (newIndex < 0) newIndex = playlistButtons.length - 1;
        
        playlistButtons[newIndex].click();
        playlistFocusIndex = newIndex;
      }
    }
    
    function handleFastForward() {
      const now = Date.now();
      if (now - lastFastForwardTime < 500) return; // Debounce
      
      lastFastForwardTime = now;
      
      // Cycle through playlists forwards
      if (playlistButtons.length > 0) {
        let newIndex = playlistFocusIndex + 1;
        if (newIndex >= playlistButtons.length) newIndex = 0;
        
        playlistButtons[newIndex].click();
        playlistFocusIndex = newIndex;
      }
    }
    
    function navigateToNextChannel() {
      if (channelItems.length === 0) return;
      
      if (currentFocusIndex < channelItems.length - 1) {
        setFocus(currentFocusIndex + 1);
      } else {
        setFocus(0);
      }
      
      // Auto-select the channel (single press behavior)
      selectChannel();
    }
    
    function navigateToPreviousChannel() {
      if (channelItems.length === 0) return;
      
      if (currentFocusIndex > 0) {
        setFocus(currentFocusIndex - 1);
      } else {
        setFocus(channelItems.length - 1);
      }
      
      // Auto-select the channel (single press behavior)
      selectChannel();
    }
    
    function handleNavigationKey(key) {
      lastKeyPressTime = Date.now();
      
      switch(key) {
        case 'ArrowUp':
          navigateUp();
          break;
        case 'ArrowDown':
          navigateDown();
          break;
        case 'ArrowLeft':
          navigateLeft();
          break;
        case 'ArrowRight':
          navigateRight();
          break;
      }
    }
    
    function focusOnChannels() {
      currentMode = 'channels';
      if (channelItems.length > 0) {
        setFocus(currentFocusIndex);
      }
    }
  </script>

  <script>
    async function loadM3uPlaylist(url) {
      try {
        console.log('Loading playlist:', url);
        const response = await fetch(url, {
          cache: 'force-cache'
        });
        const text = await response.text();
        
        const channels = [];
        const lines = text.split('\n');
        
        let i = 0;
        while (i < lines.length) {
          const line = lines[i].trim();
          
          if (line.startsWith('#EXTINF:')) {
            const extinfLine = line;
            
            const nameMatch = extinfLine.match(/,([^,]+)$/);
            let channelName = nameMatch ? nameMatch[1].trim() : 'Unknown';
            
            const logoMatch = extinfLine.match(/tvg-logo="([^"]*)"/);
            let logoUrl = logoMatch ? logoMatch[1] : 'https://i.postimg.cc/d1hHy4ss/11.png';
            
            channelName = channelName.replace(/["']/g, '').trim();
            
            let j = i + 1;
            let urls = [];
            
            while (j < lines.length) {
              const nextLine = lines[j].trim();
              
              if (nextLine.startsWith('#EXTINF:')) {
                break;
              }
              
              if (nextLine && !nextLine.startsWith('#')) {
                urls.push(nextLine);
              }
              
              j++;
            }
            
            if (urls.length === 1) {
              channels.push({
                name: channelName,
                logo: logoUrl,
                url: urls[0]
              });
            } else if (urls.length > 1) {
              urls.forEach((url, index) => {
                channels.push({
                  name: `${channelName} ${index + 1}`,
                  logo: logoUrl,
                  url: url
                });
              });
            }
            
            i = j;
          } else {
            i++;
          }
        }
        
        return channels;
        
      } catch (error) {
        console.error('Error loading M3U playlist:', error);
        return [];
      }
    }
  </script>

                 loading="lazy"
                 alt="${displayName}">
            <div class="channel-name">${displayName}</div>
          </div>
        `;
      });
      
      html += '</div>';
      
      channelList.innerHTML = html;
      
      channelItems = document.querySelectorAll('.channel-item');
      channelItems.forEach((item, index) => {
        item.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          currentFocusIndex = index;
          currentMode = 'channels';
          setFocus(currentFocusIndex);
          const url = this.getAttribute('data-url');
          const logo = this.getAttribute('data-logo');
          if (url && url !== 'null') {
            playChannel(url, logo);
          }
        });
      });
      
      updateChannelItems();
      focusOnChannels();
      
      setTimeout(() => {
        channelList.scrollTop = 0;
      }, 100);
    }
  </script>
  
  <script>
    function initPlayer(url, logo) {
      // Inject watermark styles
      const style = document.createElement('style');
      style.textContent = `
        .clappr-watermark[data-watermark] {
          position: absolute;
          min-width: 70px;
          max-width: 200px;
          width: 12%;
          text-align: center;
          z-index: 10;
          left: 10% !important;
          bottom: 13% !important;
          top: auto !important;
          right: auto !important;
          transform: scale(0.7) !important;
          transform-origin: left bottom !important;
        }
        .clappr-watermark[data-watermark] img {
          max-width: 100%;
          border: none;
          opacity: 0.7;
          box-shadow: none;
        }
        .clappr-poster.hide {
          opacity: 0;
          transition: opacity 0.5s ease;
        }
      `;
      document.head.appendChild(style);
      
      // Create player - only once
      if (!player) {
        player = new Clappr.Player({
          source: url,
          parentId: "#player",
          autoPlay: true,
          mute: false,
          width: "100%",
          height: "100%",
          watermark: "https://i.postimg.cc/d1hHy4ss/11.png",
          watermarkPosition: 'bottom-right',
          watermarkOpacity: 0.7,
          plugins: [
            HlsjsPlayback, 
            LevelSelector,
            window.ClapprPipMode ? window.ClapprPipMode.PipButton : null
          ].filter(Boolean),
          mediacontrol: { 
            seekbar: "red", 
            buttons: "white" 
          },
          poster: "https://i.pinimg.com/originals/5a/93/4e/5a934e84f67d2a61a118ec95b1d6cb74.gif"
        });
        
        window.player = player;
        
        player.on('play', function() {
          const posterElement = document.querySelector('.clappr-poster');
          if (posterElement) {
            posterElement.classList.add('hide');
            setTimeout(() => {
              posterElement.style.display = 'none';
            }, 500);
          }
        });
      } else {
        // Player already exists, just load new source
        player.load(url);
      }
    }
    
    function playChannel(url, logo) {
      if (player) {
        player.load(url);
        player.configure({ 
          autoPlay: true,
          poster: "https://i.pinimg.com/originals/5a/93/4e/5a934e84f67d2a61a118ec95b1d6cb74.gif"
        });
        
        setTimeout(() => {
          const posterElement = document.querySelector('.clappr-poster');
          if (posterElement) {
            posterElement.style.display = 'block';
            posterElement.classList.remove('hide');
          }
        }, 100);
      } else {
        initPlayer(url, logo);
      }
    }
  </script>
</body>
</html>
